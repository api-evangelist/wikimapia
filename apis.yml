aid: wikimapia
name: Wikimapia
description: >-
  Wikimapia is a collaborative geographic wiki that layers crowdsourced place information onto
  satellite imagery. Launched in 2006, the platform covers over 32 million geographic objects
  contributed by its community. The REST API provides programmatic access to places, categories,
  streets, and geographic searches using API-key authentication. Responses are available in JSON
  and KML formats. The API supports bounding-box queries, coordinate-based nearest-place lookups,
  full-text search, and detailed place retrieval including geometry, photos, comments, and
  community-tagged categories.
