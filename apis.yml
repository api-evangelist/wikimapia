apis:
  - aid: wikimapia:rest-api
    name: Wikimapia REST API
    description: >-
      The Wikimapia REST API provides access to crowdsourced geographic data including places,
      categories, streets, and languages. Supports place search by bounding box, coordinates,
      or full-text query; place lookup by ID with configurable data blocks; nearest-place and
      nearest-street queries; and full category and language listings. Requires an API key passed
      as a query parameter. Responses are available in JSON (default) and KML formats.
      The free tier allows up to 100 requests per 5 minutes per domain.
