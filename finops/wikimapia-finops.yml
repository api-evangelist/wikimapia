principles:
  - name: Visibility
    description: Track Wikimapia API request volume monthly per registered key and domain.
  - name: Allocation
    description: Assign API keys per team or product to attribute usage to cost centers.
  - name: Optimization
    description: >-
      Cache place data locally to minimize repeated lookups against the 100-req/5-min quota.
      Use the data_blocks parameter to limit response payload size and reduce latency.
  - name: Accountability
    description: >-
      Monitor request counts against the 100/5-min threshold. Set alerts before quota
      exhaustion. Review key usage quarterly and retire unused keys.
